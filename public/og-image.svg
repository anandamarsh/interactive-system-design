<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1e293b" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1e293b" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1e293b" stroke-width="1"/>

  <!-- Blue accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="#2563eb"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="64" height="64" rx="14" fill="#2563eb"/>
  <text x="112" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="white" text-anchor="middle">SD</text>

  <!-- Main title -->
  <text x="80" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">Interactive</text>
  <text x="80" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#2563eb" letter-spacing="-2">System Design</text>

  <!-- Subtitle -->
  <text x="80" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" fill="#94a3b8" letter-spacing="0">Learn by doing. Live simulations for FAANG prep.</text>

  <!-- Topic pills -->
  <!-- RPC pill -->
  <rect x="80" y="460" width="120" height="40" rx="20" fill="#1e3a5f"/>
  <text x="140" y="485" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#60a5fa" text-anchor="middle" font-weight="600">RPC</text>

  <!-- Consistent Hashing pill -->
  <rect x="216" y="460" width="230" height="40" rx="20" fill="#1e293b"/>
  <text x="331" y="485" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">Consistent Hashing</text>

  <!-- Load Balancing pill -->
  <rect x="462" y="460" width="190" height="40" rx="20" fill="#1e293b"/>
  <text x="557" y="485" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">Load Balancing</text>

  <!-- LRU Cache pill -->
  <rect x="668" y="460" width="140" height="40" rx="20" fill="#1e293b"/>
  <text x="738" y="485" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">LRU Cache</text>

  <!-- More pill -->
  <rect x="824" y="460" width="80" height="40" rx="20" fill="#1e293b"/>
  <text x="864" y="485" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">+more</text>

  <!-- Bottom tag line -->
  <text x="80" y="580" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#334155">100% browser-based · No server · No sign-up</text>
</svg>
